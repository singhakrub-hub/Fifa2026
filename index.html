<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 — Score Progression</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #0a0e1a; color: #e8eaf0; min-height: 100vh; padding: 20px; }
  h1 { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 16px; }
  .card { background: #111827; border: 0.5px solid #1f2937; border-radius: 12px; padding: 20px; max-width: 860px; margin: 0 auto; }
  .ctrl { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .md-badge { font-size: 20px; font-weight: 500; color: #f9fafb; min-width: 60px; }
  button { background: #1f2937; border: 0.5px solid #374151; color: #e5e7eb; border-radius: 8px; padding: 5px 12px; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: background 0.15s; }
  button:hover { background: #374151; }
  button.active { background: #2563eb; border-color: #3b82f6; color: #fff; }
  select { background: #1f2937; border: 0.5px solid #374151; color: #e5e7eb; border-radius: 8px; padding: 5px 8px; font-size: 12px; cursor: pointer; }
  input[type=range] { flex: 1; min-width: 80px; accent-color: #3b82f6; }
  .lbl { font-size: 12px; color: #6b7280; white-space: nowrap; }
  #legend-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 24px; }
  .leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #9ca3af; }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .leg-score { font-weight: 500; color: #f3f4f6; }
  .chart-wrap { position: relative; width: 100%; height: 400px; }
  .progress-bar { height: 3px; background: #1f2937; border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .progress-fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.5s ease; }
  @media (max-width: 500px) { .chart-wrap { height: 280px; } h1 { font-size: 16px; } }
</style>
</head>
<body>
<div class="card">
  <h1>FIFA World Cup 2026 — Score Progression</h1>
  <p class="subtitle">คะแนนสะสมแต่ละ Matchday · 39 ผู้เข้าแข่งขัน</p>

  <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:10%"></div></div>

  <div class="ctrl">
    <button id="playBtn" onclick="togglePlay()">&#9654; เล่น</button>
    <button onclick="stepBack()" title="ย้อนกลับ">&#8592;</button>
    <button onclick="stepFwd()" title="ถัดไป">&#8594;</button>
    <span class="md-badge" id="mdLabel">MD 1</span>
    <input type="range" min="1" max="10" value="1" step="1" id="mdSlider" oninput="goToMd(+this.value)">
    <span class="lbl">ความเร็ว:</span>
    <select id="speedSel" onchange="setSpeed()">
      <option value="2000">ช้า</option>
      <option value="1200" selected>ปกติ</option>
      <option value="600">เร็ว</option>
      <option value="300">เร็วมาก</option>
    </select>
    <select id="topSel" onchange="renderMd(currentMd)">
      <option value="10" selected>Top 10</option>
      <option value="20">Top 20</option>
      <option value="39">ทั้งหมด</option>
    </select>
  </div>

  <div id="legend-wrap"></div>
  <div class="chart-wrap">
    <canvas id="mc" role="img" aria-label="แผนภูมิคะแนนสะสม FIFA WC 2026"></canvas>
  </div>
</div>

<script>
const rounds = ['MD1','MD2','MD3','MD4','MD5','MD6','MD7','MD8','MD9','MD10'];
const TOTAL = 10;

const allData = [
  {name:'Kareem',      cum:[3,5,6,7,10,15,19,29,33,37]},
  {name:'Peck',        cum:[2,5,6,7,11,16,19,27,30,34]},
  {name:'M',           cum:[1,3,5,8,11,13,16,26,30,33]},
  {name:'Jab',         cum:[1,4,6,7,10,15,18,27,30,32]},
  {name:'Bomb',        cum:[2,5,7,7,12,15,17,26,29,32]},
  {name:'Gift',        cum:[3,5,6,9,11,13,15,25,29,31]},
  {name:'First',       cum:[2,4,6,6,11,15,15,24,29,31]},
  {name:'Red',         cum:[2,4,7,9,13,17,20,26,28,31]},
  {name:'Ham',         cum:[2,5,9,10,14,16,17,23,27,31]},
  {name:'X',           cum:[2,2,3,5,6,12,13,23,27,31]},
  {name:'Tanadej',     cum:[2,3,7,7,12,15,18,26,28,30]},
  {name:'Aof',         cum:[1,4,5,5,9,13,16,25,28,30]},
  {name:'Zico',        cum:[2,4,5,7,10,14,15,24,26,30]},
  {name:'Arm',         cum:[2,3,3,7,9,11,12,23,26,29]},
  {name:'Oh',          cum:[1,3,4,5,9,12,15,21,25,29]},
  {name:'Tony',        cum:[3,3,8,9,11,13,17,26,27,28]},
  {name:'Sunet',       cum:[2,5,6,7,10,15,18,24,27,28]},
  {name:'Nat',         cum:[2,3,7,8,10,12,13,24,25,28]},
  {name:'Ice',         cum:[1,4,5,6,10,13,17,23,25,28]},
  {name:'Singha',      cum:[2,3,5,6,9,11,14,23,25,28]},
  {name:'Bank',        cum:[1,5,6,8,8,11,11,22,24,28]},
  {name:'Nok',         cum:[1,3,8,10,11,14,16,24,26,27]},
  {name:'Attapol',     cum:[0,3,5,9,12,16,18,23,25,27]},
  {name:'Wasu',        cum:[1,3,4,9,9,13,15,21,25,27]},
  {name:'Birth',       cum:[1,3,4,5,8,10,13,20,25,27]},
  {name:'Mongkol',     cum:[2,4,6,6,10,12,13,20,24,27]},
  {name:'Chukiat',     cum:[1,4,5,5,11,12,13,24,25,26]},
  {name:'Teerachat',   cum:[2,5,7,10,13,13,15,23,25,26]},
  {name:'BomKee',      cum:[1,3,4,5,9,13,15,22,24,26]},
  {name:'Mike',        cum:[2,2,4,5,9,12,15,21,24,26]},
  {name:'Wut',         cum:[2,3,3,8,10,12,14,21,24,26]},
  {name:'Kosee',       cum:[2,2,4,5,9,12,14,20,23,26]},
  {name:'Nick',        cum:[2,4,5,5,8,9,10,19,22,26]},
  {name:'Jay',         cum:[2,4,4,6,9,10,13,21,23,25]},
  {name:'Tos',         cum:[2,2,3,3,8,11,13,20,21,23]},
  {name:'Ton',         cum:[2,2,6,6,9,12,14,21,22,22]},
  {name:'Suthep',      cum:[1,1,7,8,8,13,15,21,21,22]},
  {name:'Watcharapong',cum:[3,4,6,6,9,12,14,18,18,19]},
  {name:'A',           cum:[0,0,2,2,2,4,6,14,14,14]},
];

const palette = [
  '#60a5fa','#f87171','#34d399','#fbbf24','#a78bfa',
  '#fb923c','#38bdf8','#f472b6','#4ade80','#e879f9',
  '#facc15','#2dd4bf','#fb7185','#818cf8','#86efac',
  '#fde68a','#67e8f9','#c4b5fd','#fca5a5','#6ee7b7',
  '#93c5fd','#f9a8d4','#a5b4fc','#fcd34d','#5eead4',
  '#fdba74','#7dd3fc','#d8b4fe','#fda4af','#6eead4',
  '#bef264','#fed7aa','#e9d5ff','#bbf7d0','#fef08a',
  '#cffafe','#fbcfe8','#ddd6fe','#fecaca',
];

let chart = null;
let currentMd = 1;
let playing = false;
let timer = null;
let speed = 1200;

function getTopN() { return +document.getElementById('topSel').value; }

function renderMd(md) {
  currentMd = md;
  document.getElementById('mdSlider').value = md;
  document.getElementById('mdLabel').textContent = 'MD ' + md;
  document.getElementById('progFill').style.width = (md / TOTAL * 100).toFixed(1) + '%';

  const topN = getTopN();
  const sorted = [...allData].sort((a,b) => b.cum[TOTAL-1]-a.cum[TOTAL-1]).slice(0, topN);

  const datasets = sorted.map((p, i) => {
    const pts = p.cum.map((v, idx) => idx < md ? v : null);
    return {
      label: p.name,
      data: pts,
      borderColor: palette[i % palette.length],
      backgroundColor: palette[i % palette.length] + '18',
      borderWidth: topN <= 10 ? 2.5 : topN <= 20 ? 1.8 : 1.2,
      pointRadius: topN <= 10 ? 4 : 2,
      pointHoverRadius: 6,
      tension: 0.35,
      fill: false,
      spanGaps: false,
    };
  });

  document.getElementById('legend-wrap').innerHTML = sorted.map((p, i) =>
    `<span class="leg-item"><span class="leg-dot" style="background:${palette[i%palette.length]}"></span>${p.name} <span class="leg-score">${p.cum[md-1]}</span></span>`
  ).join('');

  if (chart) {
    chart.data.datasets = datasets;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('mc'), {
      type: 'line',
      data: { labels: rounds, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 500, easing: 'easeInOutQuart' },
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1f2937',
            borderColor: '#374151',
            borderWidth: 1,
            titleColor: '#f9fafb',
            bodyColor: '#d1d5db',
            filter: item => item.raw !== null,
            callbacks: {
              title: ctx => 'หลัง ' + ctx[0].label,
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y} pts`,
            }
          }
        },
        scales: {
          x: {
            ticks: { autoSkip: false, color: '#6b7280', font: { size: 11 } },
            grid: { color: 'rgba(255,255,255,0.05)' }
          },
          y: {
            min: 0, max: 40,
            title: { display: true, text: 'คะแนนสะสม', color: '#6b7280', font: { size: 12 } },
            ticks: { color: '#6b7280', font: { size: 11 } },
            grid: { color: 'rgba(255,255,255,0.05)' }
          }
        }
      }
    });
  }
}

function togglePlay() {
  if (playing) {
    clearInterval(timer); playing = false;
    document.getElementById('playBtn').innerHTML = '&#9654; เล่น';
    document.getElementById('playBtn').classList.remove('active');
  } else {
    if (currentMd >= TOTAL) currentMd = 0;
    playing = true;
    document.getElementById('playBtn').innerHTML = '&#9646;&#9646; หยุด';
    document.getElementById('playBtn').classList.add('active');
    timer = setInterval(() => {
      if (currentMd < TOTAL) { renderMd(currentMd + 1); }
      else {
        clearInterval(timer); playing = false;
        document.getElementById('playBtn').innerHTML = '&#9654; เล่น';
        document.getElementById('playBtn').classList.remove('active');
      }
    }, speed);
  }
}
function stepBack() { if (currentMd > 1) renderMd(currentMd - 1); }
function stepFwd()  { if (currentMd < TOTAL) renderMd(currentMd + 1); }
function goToMd(v) { renderMd(v); }
function setSpeed() {
  speed = +document.getElementById('speedSel').value;
  if (playing) { clearInterval(timer); togglePlay(); togglePlay(); }
}

renderMd(1);
</script>
</body>
</html>
